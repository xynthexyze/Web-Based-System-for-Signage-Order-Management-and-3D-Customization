<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V.A. Erni's Outdoor Advertising and Metal Crafts - Sign Up</title>
<link rel="stylesheet" href="index.css" />
<link rel="stylesheet" href="LS.css" />
</head>
<body>
<img src="logo since 2002 (1).png" alt="Logo" class="logo-img" />
<main>
<section class="form-section container">
<h2>Create an Account</h2>
<p class="form-subtitle">Join our community today</p>
<form id="register-form">
<div class="form-name">
<input type="text" id="first_name" placeholder="First Name" required />
<input type="text" id="last_name" placeholder="Last Name" required />
</div>
<input type="email" id="email" placeholder="Email" required />
<input type="password" id="password" placeholder="Password" required />
<input type="password" id="confirm" placeholder="Confirm Password" required />
<input type="text" id="contact" placeholder="Phone Number" required />
<input type="text" id="address" placeholder="Address" required />
<button type="submit">Sign Up</button>
</form>
<p>Already have an account? <a href="login.html">Login here</a>.</p>
<p><a href="#" id="forgot-password">Forgot Password?</a></p>
</section>
</main>
<!-- FIXED: Changed from signup.js to LS.js -->
<script type="module" src="LS.js"></script>
</body>
</html>
